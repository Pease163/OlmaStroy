{% extends "base.html" %}

{% block title %}404 — Страница не найдена{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-page__number">404</div>
    <div class="error-page__content">
        <h1 class="error-page__title">Страница не найдена</h1>
        <p class="error-page__text">Запрашиваемая страница не существует или была перемещена</p>
        <a href="{{ url_for('main.index') }}" class="btn-main">На главную</a>
    </div>
</section>
{% endblock %}
