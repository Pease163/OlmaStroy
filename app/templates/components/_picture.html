{% macro picture(src, alt='', cls='', loading='lazy') %}
{% set base = src.rsplit('.', 1)[0] if '.' in src else src %}
{% set ext = src.rsplit('.', 1)[1] if '.' in src else 'jpg' %}
<picture>
    <source srcset="{{ base }}.webp" type="image/webp">
    <img src="{{ src }}" alt="{{ alt }}" class="{{ cls }}" loading="{{ loading }}">
</picture>
{% endmacro %}
