{% macro blog_card(post) %}
<article class="blog-card">
    {% if post.image_url %}
        <a href="{{ url_for('blog.blog_detail', slug=post.slug) }}">
            <img src="{{ post.image_url }}" alt="{{ post.title }}" class="blog-card__img" loading="lazy">
        </a>
    {% else %}
        <a href="{{ url_for('blog.blog_detail', slug=post.slug) }}" aria-label="{{ post.title }}">
            <div class="blog-card__placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
        </a>
    {% endif %}
    <div class="blog-card__body">
        <time class="blog-card__date" datetime="{{ post.created_at.strftime('%Y-%m-%d') }}">
            {{ post.created_at | ru_date }}
        </time>
        <h3 class="blog-card__title">
            <a href="{{ url_for('blog.blog_detail', slug=post.slug) }}" style="color: inherit; text-decoration: none;">{{ post.title }}</a>
        </h3>
        <p class="blog-card__excerpt">{{ post.excerpt }}</p>
        <a href="{{ url_for('blog.blog_detail', slug=post.slug) }}" class="blog-card__link">Читать</a>
    </div>
</article>
{% endmacro %}
