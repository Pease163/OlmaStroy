{% macro render_pagination(pagination) %}
<div class="pagination">
    {% if pagination.has_prev %}
        <a href="?page={{ pagination.prev_num }}" class="page-link">&larr;</a>
    {% endif %}
    {% for page in pagination.iter_pages() %}
        {% if page %}
            <a href="?page={{ page }}" class="page-link {% if page == pagination.page %}active{% endif %}">{{ page }}</a>
        {% else %}
            <span class="page-dots">&hellip;</span>
        {% endif %}
    {% endfor %}
    {% if pagination.has_next %}
        <a href="?page={{ pagination.next_num }}" class="page-link">&rarr;</a>
    {% endif %}
</div>
{% endmacro %}
