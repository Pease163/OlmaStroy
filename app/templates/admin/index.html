{% extends 'admin/master.html' %}

{% block body %}
<div class="container-fluid" style="padding: 30px;">
    <h2 style="margin-bottom: 30px;">Добро пожаловать в панель управления</h2>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
        <div class="dashboard-card">
            <h3>{{ stats.posts_count }}</h3>
            <p>Статьи</p>
        </div>
        <div class="dashboard-card">
            <h3>{{ stats.vacancies_count }}</h3>
            <p>Вакансии</p>
        </div>
        <div class="dashboard-card">
            <h3>{{ stats.projects_count }}</h3>
            <p>Проекты</p>
        </div>
        <div class="dashboard-card">
            <h3>{{ stats.unread_contacts }}</h3>
            <p>Заявки непрочитанные</p>
        </div>
    </div>

    <div class="quick-actions">
        <a href="{{ url_for('blogpost.create_view') }}" class="btn btn-primary">Новая статья</a>
        <a href="{{ url_for('vacancy.create_view') }}" class="btn btn-primary">Новая вакансия</a>
    </div>
</div>
{% endblock %}
