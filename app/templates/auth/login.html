<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | ОлмаСтрой</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700;800&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background: var(--c-dark);
            background-image: radial-gradient(ellipse at 50% 0%, rgba(8, 110, 181, 0.15) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: auto;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 40px;">
            <a href="{{ url_for('main.index') }}" style="font-family: var(--font-main); font-size: 2rem; font-weight: 800; letter-spacing: 0.08em; text-decoration: none; color: var(--c-white); display: inline-block;">ОЛМАСТРОЙ</a>
            <p style="color: rgba(255,255,255,0.5); margin-top: 10px; font-size: 0.9rem;">Вход в панель управления</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message {{ category }}" role="alert" style="margin-bottom: 20px;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div>
                <label for="login-username" class="sr-only">Логин</label>
                <input type="text" name="username" id="login-username" class="login-input" placeholder="Логин" required autocomplete="username">
            </div>
            <div>
                <label for="login-password" class="sr-only">Пароль</label>
                <input type="password" name="password" id="login-password" class="login-input" placeholder="Пароль" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-main" style="width: 100%; margin-top: 10px;">Войти</button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="{{ url_for('main.index') }}" style="color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none;">&larr; Вернуться на сайт</a>
        </div>
    </div>
</body>
</html>
